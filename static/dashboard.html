<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ClawDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --zinc-50: #fafafa; --zinc-100: #f4f4f5; --zinc-200: #e4e4e7;
            --zinc-300: #d4d4d8; --zinc-400: #a1a1aa; --zinc-500: #71717a;
            --zinc-600: #52525b; --zinc-700: #3f3f46; --zinc-800: #27272a;
            --zinc-900: #18181b; --zinc-950: #09090b;
            --accent: #818cf8; --accent-hover: #6366f1; --accent-light: #a5b4fc;
            --green: #34d399; --orange: #fb923c; --red: #f87171; --purple: #c084fc;
            --bg-base: var(--zinc-950); --bg-elevated: var(--zinc-900); --bg-input: var(--zinc-800);
            --border: rgba(255,255,255,.08); --text-primary: #fff; --text-secondary: var(--zinc-400);
        }
        
        [data-theme="light"] {
            --zinc-950: #fafafa; --zinc-900: #fff; --zinc-800: #f4f4f5;
            --zinc-700: #e4e4e7; --zinc-600: #d4d4d8; --zinc-500: #a1a1aa;
            --zinc-400: #71717a; --zinc-300: #52525b; --zinc-200: #3f3f46;
            --zinc-100: #27272a; --zinc-50: #18181b;
            --bg-base: #fafafa; --bg-elevated: #fff; --bg-input: #f4f4f5;
            --border: rgba(0,0,0,.08); --text-primary: #18181b; --text-secondary: #71717a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-base);
            color: var(--zinc-200);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background .3s, color .3s;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: 280px; min-width: 280px; background: var(--bg-elevated);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            height: 100vh; transition: all .3s;
        }
        .sidebar.collapsed { width: 80px; min-width: 80px; }
        .sidebar.collapsed .sidebar-logo span,
        .sidebar.collapsed .nav-section-title,
        .sidebar.collapsed .nav-item span:not(.icon),
        .sidebar.collapsed .badge-count,
        .sidebar.collapsed .agent-name,
        .sidebar.collapsed .btn-new-agent span { display: none; }
        .sidebar.collapsed .nav-item,
        .sidebar.collapsed .agent-item { justify-content: center; }

        .sidebar-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-logo {
            font-size: 18px; font-weight: 800; color: var(--text-primary);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-logo .emoji { font-size: 24px; }
        .sidebar-logo span {
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-toggle {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 20px; padding: 4px;
            transition: color .2s;
        }
        .sidebar-toggle:hover { color: var(--text-primary); }

        .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px; }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--zinc-700); border-radius: 2px; }
        
        .nav-section { margin-bottom: 12px; }
        .nav-section-title {
            font-size: 11px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; padding: 8px 12px; letter-spacing: .05em;
        }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            border-radius: 12px; color: var(--text-secondary); cursor: pointer;
            font-size: 14px; font-weight: 500; transition: all .2s;
            margin-bottom: 4px; position: relative;
        }
        .nav-item:hover { background: rgba(129,140,248,.08); color: var(--text-primary); }
        .nav-item.active {
            background: rgba(129,140,248,.15); color: var(--accent);
        }
        .nav-item .icon { font-size: 20px; width: 24px; text-align: center; }
        .nav-item .badge-count {
            margin-left: auto; background: var(--zinc-700); color: var(--zinc-300);
            font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px;
        }

        .agent-list { padding: 0 0 12px; max-height: 300px; overflow-y: auto; }
        .agent-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            border-radius: 12px; cursor: pointer; transition: all .2s;
            margin-bottom: 4px;
        }
        .agent-item:hover { background: rgba(129,140,248,.08); }
        .agent-item.active { background: rgba(129,140,248,.15); }
        .agent-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
            position: relative;
        }
        .agent-dot.online {
            background: var(--green);
            box-shadow: 0 0 0 2px rgba(52,211,153,.2);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 2px rgba(52,211,153,.2); }
            50% { box-shadow: 0 0 0 4px rgba(52,211,153,.4); }
        }
        .agent-dot.offline { background: var(--zinc-600); }
        .agent-name {
            font-size: 14px; font-weight: 500; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
        .btn-new-agent {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: var(--accent); color: #fff; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all .3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; overflow: hidden;
        }
        .btn-new-agent::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            opacity: 0; transition: opacity .3s;
        }
        .btn-new-agent:hover::before { opacity: 1; }
        .btn-new-agent:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(129,140,248,.3); }
        .btn-new-agent span { position: relative; z-index: 1; }

        /* === MAIN === */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* === TOPBAR === */
        .topbar {
            height: 68px; border-bottom: 1px solid var(--border); padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; background: var(--bg-elevated);
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .breadcrumbs {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; color: var(--text-secondary);
        }
        .breadcrumbs .sep { color: var(--zinc-600); }
        .breadcrumbs .current { color: var(--text-primary); font-weight: 600; }
        
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        
        .cmd-btn {
            padding: 8px 16px; border-radius: 10px; background: rgba(129,140,248,.1);
            border: 1px solid rgba(129,140,248,.2); color: var(--accent);
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: all .2s;
        }
        .cmd-btn:hover { background: rgba(129,140,248,.15); }
        .cmd-key {
            padding: 2px 6px; background: rgba(129,140,248,.2); border-radius: 4px;
            font-size: 11px; font-weight: 700;
        }
        
        .theme-toggle {
            background: none; border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 10px; cursor: pointer;
            color: var(--text-secondary); font-size: 18px;
            transition: all .2s;
        }
        .theme-toggle:hover { background: rgba(129,140,248,.08); color: var(--text-primary); }
        
        .plan-badge {
            padding: 6px 14px; border-radius: 100px; font-size: 12px;
            font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
        }
        .plan-free { background: rgba(113,113,122,.15); color: var(--zinc-400); }
        .plan-pro { background: rgba(129,140,248,.15); color: var(--accent); }
        .plan-business { background: rgba(251,146,60,.15); color: var(--orange); }
        
        .user-menu {
            position: relative;
        }
        .user-info {
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            padding: 6px 12px; border-radius: 12px; transition: all .2s;
        }
        .user-info:hover { background: rgba(129,140,248,.08); }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: #fff;
        }
        .user-name {
            font-size: 14px; font-weight: 600; color: var(--text-primary);
        }
        .user-dropdown {
            position: absolute; top: 100%; right: 0; margin-top: 8px;
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.3);
            min-width: 200px; display: none; animation: fadeInDown .3s;
            z-index: 50;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-dropdown.open { display: block; }
        .dropdown-item {
            padding: 12px 16px; cursor: pointer; transition: all .2s;
            font-size: 14px; color: var(--text-secondary);
            display: flex; align-items: center; gap: 10px;
        }
        .dropdown-item:first-child { border-radius: 16px 16px 0 0; }
        .dropdown-item:last-child { border-radius: 0 0 16px 16px; }
        .dropdown-item:hover { background: rgba(129,140,248,.08); color: var(--text-primary); }
        .dropdown-item.danger { color: var(--red); }
        .dropdown-item.danger:hover { background: rgba(248,113,113,.1); }

        /* === CONTENT === */
        .content {
            flex: 1; overflow-y: auto; padding: 32px;
            background: var(--bg-base);
        }
        .content::-webkit-scrollbar { width: 8px; }
        .content::-webkit-scrollbar-thumb { background: var(--zinc-700); border-radius: 4px; }

        /* === STATS === */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; transition: all .3s;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; right: 0;
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            opacity: .05; transform: translate(30px, -30px);
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,.2);
        }
        .stat-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .stat-label {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: .05em;
        }
        .stat-icon {
            font-size: 24px; opacity: .7;
        }
        .stat-value {
            font-size: 36px; font-weight: 900; color: var(--text-primary);
            letter-spacing: -.02em; margin-bottom: 8px;
        }
        .stat-change {
            font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 4px;
        }
        .stat-change.positive { color: var(--green); }
        .stat-change.negative { color: var(--red); }
        
        /* Sparkline */
        .sparkline {
            height: 40px; display: flex; align-items: flex-end; gap: 2px;
            margin-top: 12px;
        }
        .sparkline-bar {
            flex: 1; background: var(--accent); border-radius: 2px 2px 0 0;
            opacity: .3; transition: opacity .3s;
        }
        .stat-card:hover .sparkline-bar { opacity: .6; }

        /* === PROGRESS CHECKLIST === */
        .checklist-card {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; margin-bottom: 32px;
        }
        .checklist-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .checklist-header h3 {
            font-size: 18px; font-weight: 700; color: var(--text-primary);
        }
        .checklist-progress {
            font-size: 14px; font-weight: 600; color: var(--accent);
        }
        .checklist-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: 10px; margin-bottom: 8px; cursor: pointer;
            transition: all .2s;
        }
        .checklist-item:hover { background: rgba(129,140,248,.05); }
        .checklist-checkbox {
            width: 20px; height: 20px; border-radius: 6px;
            border: 2px solid var(--zinc-600); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all .3s;
        }
        .checklist-item.done .checklist-checkbox {
            background: var(--green); border-color: var(--green);
        }
        .checklist-item.done .checklist-checkbox::after {
            content: '✓'; color: #fff; font-size: 12px; font-weight: 700;
        }
        .checklist-item.done .checklist-text {
            text-decoration: line-through; opacity: .5;
        }
        .checklist-text {
            font-size: 14px; color: var(--text-primary);
        }

        /* === ACTIVITY FEED === */
        .activity-card {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
        }
        .activity-card h3 {
            font-size: 18px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 20px;
        }
        .activity-item {
            display: flex; gap: 12px; padding: 12px; border-radius: 10px;
            margin-bottom: 8px; transition: all .2s;
        }
        .activity-item:hover { background: rgba(129,140,248,.05); }
        .activity-icon {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .activity-icon.blue { background: rgba(129,140,248,.15); }
        .activity-icon.green { background: rgba(52,211,153,.15); }
        .activity-icon.orange { background: rgba(251,146,60,.15); }
        .activity-content { flex: 1; }
        .activity-text {
            font-size: 14px; color: var(--text-primary); margin-bottom: 4px;
        }
        .activity-time {
            font-size: 12px; color: var(--text-secondary);
        }

        /* === TABS === */
        .tabs {
            display: flex; gap: 4px; border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }
        .tab {
            padding: 12px 20px; font-size: 14px; font-weight: 600;
            color: var(--text-secondary); cursor: pointer;
            border-bottom: 2px solid transparent; transition: all .2s;
            position: relative;
        }
        .tab:hover { color: var(--text-primary); background: rgba(129,140,248,.05); }
        .tab.active {
            color: var(--accent); border-bottom-color: var(--accent);
        }

        /* === FORMS === */
        .form-section {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; padding: 32px; margin-bottom: 24px;
        }
        .form-section h3 {
            font-size: 18px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 20px;
        }
        .form-row { margin-bottom: 20px; }
        .form-row label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 8px;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-primary); font-size: 14px; font-family: inherit;
            outline: none; transition: all .2s;
        }
        .form-row input:focus,
        .form-row select:focus,
        .form-row textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(129,140,248,.1);
        }
        .form-row textarea { resize: vertical; min-height: 120px; }
        .form-row select { cursor: pointer; appearance: none; }
        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .form-hint {
            font-size: 12px; color: var(--text-secondary); margin-top: 6px;
        }
        .save-indicator {
            font-size: 13px; color: var(--green); font-weight: 600;
            display: none; align-items: center; gap: 6px;
        }
        .save-indicator.show { display: flex; }

        /* === BUTTONS === */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 24px; border-radius: 12px; font-size: 14px;
            font-weight: 600; cursor: pointer; border: none; transition: all .3s;
            font-family: inherit; position: relative; overflow: hidden;
        }
        .btn::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,.2), transparent);
            opacity: 0; transform: scale(0); transition: all .5s;
        }
        .btn.ripple::before {
            opacity: 1; transform: scale(2);
        }
        .btn span { position: relative; z-index: 1; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(129,140,248,.3);
        }
        .btn-danger {
            background: rgba(248,113,113,.12); color: var(--red);
            border: 1px solid rgba(248,113,113,.2);
        }
        .btn-danger:hover {
            background: rgba(248,113,113,.2);
        }
        .btn-ghost {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            background: rgba(129,140,248,.08); color: var(--text-primary);
        }
        .btn-sm { padding: 10px 18px; font-size: 13px; }
        .btn:disabled {
            opacity: .5; cursor: not-allowed;
        }
        .btn-group {
            display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
        }

        /* === KNOWLEDGE BASE === */
        .kb-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .kb-search {
            position: relative; flex: 1; max-width: 400px;
        }
        .kb-search input {
            width: 100%; padding: 10px 16px 10px 40px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-primary); font-size: 14px;
        }
        .kb-search::before {
            content: '🔍'; position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); font-size: 16px;
        }
        .kb-list { margin-top: 20px; }
        .kb-item {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: flex-start;
            transition: all .3s; cursor: grab;
        }
        .kb-item:hover {
            border-color: rgba(129,140,248,.3);
            box-shadow: 0 4px 16px rgba(0,0,0,.1);
        }
        .kb-item.dragging {
            opacity: .5; cursor: grabbing;
        }
        .kb-item h4 {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            margin-bottom: 6px;
        }
        .kb-item p {
            font-size: 13px; color: var(--text-secondary); line-height: 1.6;
        }
        .kb-actions {
            display: flex; gap: 8px;
        }
        .kb-delete {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 20px; padding: 4px;
            transition: all .2s;
        }
        .kb-delete:hover { color: var(--red); }

        /* === CHANNELS === */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .channel-card {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; padding: 28px; transition: all .3s;
        }
        .channel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,.2);
        }
        .channel-card h4 {
            font-size: 18px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
        }
        .channel-card p {
            font-size: 13px; color: var(--text-secondary);
            margin-bottom: 20px; line-height: 1.6;
        }
        .channel-status {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 600; margin-bottom: 16px;
        }
        .channel-status.connected { color: var(--green); }
        .channel-status.disconnected { color: var(--text-secondary); }
        .channel-status::before {
            content: ''; width: 8px; height: 8px; border-radius: 50%;
        }
        .channel-status.connected::before {
            background: var(--green);
            box-shadow: 0 0 0 2px rgba(52,211,153,.2);
            animation: pulse 2s ease-in-out infinite;
        }
        .channel-status.disconnected::before {
            background: var(--zinc-600);
        }
        .code-box {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; font-family: 'Courier New', monospace;
            font-size: 12px; color: var(--green); word-break: break-all;
            position: relative; margin-top: 16px;
        }
        .code-copy {
            position: absolute; top: 12px; right: 12px;
            background: rgba(129,140,248,.1); border: 1px solid rgba(129,140,248,.2);
            color: var(--accent); padding: 6px 12px; border-radius: 8px;
            cursor: pointer; font-size: 12px; font-weight: 600;
            transition: all .2s;
        }
        .code-copy:hover { background: rgba(129,140,248,.2); }

        /* === CONVERSATIONS === */
        .conv-list { margin-top: 16px; }
        .conv-item {
            display: flex; align-items: center; gap: 14px; padding: 14px 16px;
            border-radius: 12px; cursor: pointer; transition: all .2s;
            border: 1px solid transparent; margin-bottom: 8px;
        }
        .conv-item:hover {
            background: rgba(129,140,248,.05);
            border-color: var(--border);
        }
        .conv-item.active {
            background: rgba(129,140,248,.1);
            border-color: rgba(129,140,248,.3);
        }
        .conv-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--zinc-700); display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .conv-info { flex: 1; min-width: 0; }
        .conv-name {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            margin-bottom: 4px;
        }
        .conv-preview {
            font-size: 13px; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .conv-meta { text-align: right; flex-shrink: 0; }
        .conv-time {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .conv-badge-ch {
            font-size: 11px; padding: 3px 8px; border-radius: 100px;
            background: rgba(129,140,248,.15); color: var(--accent);
            font-weight: 600;
        }

        /* === MESSAGES === */
        .messages-body {
            display: flex; flex-direction: column; gap: 16px;
            max-height: 60vh; overflow-y: auto; padding: 20px;
            background: var(--bg-input); border-radius: 16px;
        }
        .msg {
            max-width: 70%; padding: 14px 18px; border-radius: 16px;
            font-size: 14px; line-height: 1.6; animation: fadeInMsg .3s;
        }
        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            align-self: flex-end; background: var(--accent); color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start; background: var(--bg-elevated);
            color: var(--text-primary); border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .msg-time {
            font-size: 11px; opacity: .7; margin-top: 6px;
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center; padding: 80px 24px;
        }
        .empty-illustration {
            font-size: 80px; margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .empty-state h3 {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: 14px; color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* === SKELETON === */
        .skeleton {
            background: linear-gradient(90deg,
                var(--zinc-800) 25%,
                var(--zinc-700) 50%,
                var(--zinc-800) 75%
            );
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-card {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
        }
        .skeleton-text {
            height: 16px; margin-bottom: 12px;
        }
        .skeleton-title {
            height: 24px; width: 60%; margin-bottom: 16px;
        }

        /* === MODALS === */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
            z-index: 200; align-items: center; justify-content: center;
        }
        .modal-overlay.active {
            display: flex; animation: fadeIn .3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 520px;
            position: relative; animation: slideUp .4s; max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal h3 {
            font-size: 24px; font-weight: 800; color: var(--text-primary);
            margin-bottom: 24px;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,.05); border: 1px solid var(--border);
            color: var(--text-secondary); width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; transition: all .2s;
        }
        .modal-close:hover {
            background: rgba(255,255,255,.1); color: var(--text-primary);
        }

        /* === CONFIRM DIALOG === */
        .confirm-dialog {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 20px; padding: 32px; width: 100%; max-width: 400px;
            text-align: center;
        }
        .confirm-dialog h4 {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 12px;
        }
        .confirm-dialog p {
            font-size: 14px; color: var(--text-secondary);
            margin-bottom: 24px; line-height: 1.6;
        }
        .confirm-actions {
            display: flex; gap: 12px; justify-content: center;
        }

        /* === TOAST === */
        .toast {
            position: fixed; bottom: 32px; right: 32px;
            background: var(--bg-elevated); border: 1px solid var(--border);
            padding: 16px 24px; border-radius: 16px; color: var(--text-primary);
            font-size: 14px; font-weight: 500; z-index: 300;
            transform: translateY(100px); opacity: 0;
            transition: all .4s; box-shadow: 0 8px 32px rgba(0,0,0,.3);
            display: flex; align-items: center; gap: 12px;
            min-width: 280px;
        }
        .toast.show {
            transform: translateY(0); opacity: 1;
        }
        .toast-progress {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: var(--accent); border-radius: 0 0 16px 16px;
            transform-origin: left; animation: progress 3s linear;
        }
        @keyframes progress {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        /* === COMMAND PALETTE === */
        .cmd-palette-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
            z-index: 250; align-items: flex-start; justify-content: center;
            padding-top: 100px;
        }
        .cmd-palette-overlay.active {
            display: flex; animation: fadeIn .2s;
        }
        .cmd-palette {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 20px; width: 100%; max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: slideUp .3s;
        }
        .cmd-search {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
        }
        .cmd-search input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-primary); font-size: 16px;
            outline: none;
        }
        .cmd-results {
            max-height: 400px; overflow-y: auto; padding: 8px;
        }
        .cmd-item {
            padding: 12px 16px; border-radius: 12px; cursor: pointer;
            transition: all .2s; display: flex; align-items: center; gap: 12px;
        }
        .cmd-item:hover, .cmd-item.selected {
            background: rgba(129,140,248,.1);
        }
        .cmd-icon {
            font-size: 20px;
        }
        .cmd-text {
            flex: 1;
        }
        .cmd-title {
            font-size: 14px; font-weight: 600; color: var(--text-primary);
        }
        .cmd-desc {
            font-size: 12px; color: var(--text-secondary);
        }

        /* === ONBOARDING === */
        .onboarding-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
            z-index: 300; align-items: center; justify-content: center;
        }
        .onboarding-overlay.active {
            display: flex; animation: fadeIn .4s;
        }
        .onboarding-wizard {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 24px; padding: 48px; width: 100%; max-width: 600px;
            text-align: center;
        }
        .onboarding-steps {
            display: flex; justify-content: center; gap: 8px; margin-bottom: 40px;
        }

            width: 40px; height: 4px; background: var(--zinc-700);

        }
        .onboarding-step.active { background: var(--accent); }
        .onboarding-step.done { background: var(--green); }
        .onboarding-icon {
            font-size: 64px; margin-bottom: 24px;
        }
        .onboarding-wizard h2 {
            font-size: 28px; font-weight: 800; color: var(--text-primary);
            margin-bottom: 16px;
        }
        .onboarding-wizard p {
            font-size: 16px; color: var(--text-secondary);
            margin-bottom: 32px; line-height: 1.7;
        }
        .onboarding-actions {
            display: flex; gap: 12px; justify-content: center;
        }

        /* === MOBILE === */
        .mobile-tabs {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-elevated); border-top: 1px solid var(--border);

        }

        .mobile-tab {

        }
        .mobile-tab .icon { font-size: 22px; }
        .mobile-tab .label { font-size: 11px; font-weight: 600; }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .sidebar, .sidebar.collapsed {
                position: fixed; left: -300px; z-index: 150;
                width: 280px; min-width: 280px;
                transition: left .3s;
            }
            .sidebar.open { left: 0; width: 280px; min-width: 280px; }
            .main { margin-left: 0 !important; width: 100% !important; }
            .topbar { padding: 0 16px; }

            .tab { white-space: nowrap; padding: 10px 14px; font-size: 13px; }
            .mobile-tabs { display: block; }

            .modal { max-width: calc(100vw - 32px); margin: 16px; max-height: 90vh; overflow-y: auto; }
            .user-dropdown { right: 0; }
        }
    </style>
</head>

<script>
const API = '';
let accessToken = localStorage.getItem('access_token');
const refreshToken = localStorage.getItem('refresh_token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

if (!accessToken) window.location.href = '/';

let agents = [];
let currentAgent = null;
let currentTab = 'settings';
let currentView = 'overview';
let stats = {};
let confirmCallback = null;

// Theme
const theme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);
document.getElementById('themeToggle').textContent = theme === 'dark' ? '🌙' : '☀️';

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('themeToggle').textContent = next === 'dark' ? '🌙' : '☀️';
}

// Init
document.getElementById('userName').textContent = user.name || user.email || 'User';
document.getElementById('userAvatar').textContent = (user.name || user.email || 'U')[0].toUpperCase();
const planBadge = document.getElementById('planBadge');
planBadge.textContent = (user.plan || 'free').toUpperCase();
planBadge.className = 'plan-badge plan-' + (user.plan || 'free');

// Token refresh
async function refreshAccessToken() {
    try {
        const res = await fetch(`${API}/api/auth/refresh`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: refreshToken }),
        });
        if (!res.ok) throw new Error('Token refresh failed');
        const data = await res.json();
        accessToken = data.access_token;
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        return true;
    } catch (e) {
        logout();
        return false;
    }
}

// API Helper
async function api(path, opts = {}) {
    const makeRequest = async (token) => {
        const res = await fetch(`${API}${path}`, {
            ...opts,
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
        });
        return res;
    };
    
    let res = await makeRequest(accessToken);
    
    if (res.status === 401 && refreshToken) {
        const refreshed = await refreshAccessToken();
        if (refreshed) res = await makeRequest(accessToken);
        else return null;
    }
    
    if (res.status === 401) { logout(); return null; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    return data;
}

// Toast
function toast(msg, icon = '✓') {
    const t = document.getElementById('toast');
    const m = document.getElementById('toastMsg');
    m.textContent = `${icon} ${msg}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Ripple effect

// Confirm dialog
function confirm(title, msg, callback) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    confirmCallback = callback;
    document.getElementById('confirmModal').classList.add('active');
}
function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('active');
    confirmCallback = null;
}
function confirmAction() {
    if (confirmCallback) confirmCallback();
    closeConfirm();
}

// User menu
function toggleUserMenu() {
    document.getElementById('userDropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
    if (!e.target.closest('.user-menu')) {
        document.getElementById('userDropdown').classList.remove('open');
    }
});

// Sidebar
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth <= 768) {
        sb.classList.toggle('open');
        // Toggle overlay
        let overlay = document.getElementById('sidebarOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'sidebarOverlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149;transition:opacity .3s';
            overlay.onclick = () => { sb.classList.remove('open'); overlay.remove(); };
            document.body.appendChild(overlay);
        } else {
            overlay.remove();
        }
    } else {
        sb.classList.toggle('collapsed');
    }
}

// Command Palette
function openCmdPalette() {
    document.getElementById('cmdPalette').classList.add('active');
    document.getElementById('cmdInput').focus();
    renderCmdResults('');
}
function closeCmdPalette() {
    document.getElementById('cmdPalette').classList.remove('active');
}
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        openCmdPalette();
    }
    if (e.key === 'Escape') {
        closeCmdPalette();
        closeConfirm();
    }
});
document.getElementById('cmdPalette').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeCmdPalette();
});
document.getElementById('cmdInput').addEventListener('input', e => {
    renderCmdResults(e.target.value);
});

function renderCmdResults(query) {
    const commands = [
        { icon: '🏠', title: 'Tổng quan', desc: 'Xem dashboard chính', action: () => showView('overview') },
        { icon: '💬', title: 'Hội thoại', desc: 'Xem tất cả hội thoại', action: () => showView('conversations') },
        { icon: '➕', title: 'Tạo Agent mới', desc: 'Tạo agent AI mới', action: () => openCreateAgent() },
        { icon: '🌙', title: 'Chuyển theme', desc: 'Đổi sang dark/light mode', action: toggleTheme },
        { icon: '🚪', title: 'Đăng xuất', desc: 'Thoát khỏi tài khoản', action: logout },
    ];
    
    const filtered = commands.filter(c =>
        c.title.toLowerCase().includes(query.toLowerCase()) ||
        c.desc.toLowerCase().includes(query.toLowerCase())
    );
    
    const html = filtered.map(c => `
        <div class="cmd-item" onclick="(${c.action.toString()})(); closeCmdPalette();">
            <span class="cmd-icon">${c.icon}</span>
            <div class="cmd-text">
                <div class="cmd-title">${c.title}</div>
                <div class="cmd-desc">${c.desc}</div>
            </div>
        </div>
    `).join('');
    
    document.getElementById('cmdResults').innerHTML = html || '<div style="padding:32px;text-align:center;color:var(--text-secondary)">Không tìm thấy lệnh nào</div>';
}

// Onboarding
function checkOnboarding() {
    if (!localStorage.getItem('onboarding_done') && agents.length === 0) {
        showOnboarding();
    }
}
function showOnboarding() {
    document.getElementById('onboarding').classList.add('active');
    renderOnboardingStep(1);
}
function renderOnboardingStep(step) {
    const steps = [
        null,
        {
            icon: '🤖',
            title: 'Tạo Agent đầu tiên',
            desc: 'Agent AI sẽ giúp bạn tự động trả lời khách hàng 24/7',
            btn: 'Tạo Agent',
            action: () => { closeOnboarding(); openCreateAgent(); }
        },
        {
            icon: '📚',
            title: 'Thêm kiến thức',
            desc: 'Upload FAQ, thông tin sản phẩm để AI trả lời chính xác hơn',
            btn: 'Tiếp tục',
            action: () => renderOnboardingStep(3)
        },
        {
            icon: '🔗',
            title: 'Kết nối kênh chat',
            desc: 'Tích hợp Telegram, Facebook, Zalo hoặc nhúng widget vào website',
            btn: 'Hoàn thành',
            action: closeOnboarding
        }
    ];
    
    document.getElementById('step1').className = 'onboarding-step' + (step >= 1 ? ' done' : '');
    document.getElementById('step2').className = 'onboarding-step' + (step === 2 ? ' active' : step > 2 ? ' done' : '');
    document.getElementById('step3').className = 'onboarding-step' + (step === 3 ? ' active' : '');
    
    const s = steps[step];
    document.getElementById('onboardingContent').innerHTML = `
        <div class="onboarding-icon">${s.icon}</div>
        <h2>${s.title}</h2>
        <p>${s.desc}</p>
        <div class="onboarding-actions">
            ${step > 1 ? '<button class="btn btn-ghost" onclick="renderOnboardingStep(' + (step - 1) + ')">Quay lại</button>' : ''}
            <button class="btn btn-primary" onclick="(${s.action.toString()})()">${s.btn}</button>
            ${step < 3 ? '<button class="btn btn-ghost" onclick="closeOnboarding()">Bỏ qua</button>' : ''}
        </div>
    `;
}
function closeOnboarding() {
    document.getElementById('onboarding').classList.remove('active');
    localStorage.setItem('onboarding_done', 'true');
}

function logout() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');

}

// BRAINSTORM
let brainstormSession = null;

async function openBrainstorm() {
    document.getElementById('brainstormModal').classList.add('active');
    
    // Load or create session
    try {
        const res = await api(`/api/agents/${currentAgent.id}/brainstorm`);
        brainstormSession = res.session;
        
        if (!brainstormSession) {
            // Start new session with initial message
            await sendBrainstormMsg('Xin chào! Tôi muốn thiết lập agent.', true);
        } else {
            renderBrainstormChat();
        }
    } catch(e) {
        document.getElementById('brainstormChat').innerHTML = `<div style="color:var(--red)">Lỗi: ${e.message}</div>`;
    }
}

function closeBrainstorm() {
    document.getElementById('brainstormModal').classList.remove('active');
}

function renderBrainstormChat() {
    const messages = brainstormSession?.messages || [];
    const chatEl = document.getElementById('brainstormChat');
    
    if (messages.length === 0) {
        chatEl.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px 0;">Bắt đầu trò chuyện để thiết lập agent của bạn!</div>';
        return;
    }
    
    chatEl.innerHTML = messages.map(m => `
        <div style="margin-bottom: 16px; text-align: ${m.role === 'user' ? 'right' : 'left'};">
            <div style="display: inline-block; max-width: 80%; padding: 12px 16px; border-radius: 16px; 
                        background: ${m.role === 'user' ? 'var(--accent)' : 'var(--bg-elevated)'};
                        color: ${m.role === 'user' ? '#fff' : 'var(--text-primary)'};
                        text-align: left; white-space: pre-wrap;">
                ${esc(m.content)}
            </div>
        </div>
    `).join('');
    
    // Scroll to bottom
    chatEl.scrollTop = chatEl.scrollHeight;
}

async function sendBrainstormMsg(customMsg = null, skipInput = false) {
    const input = document.getElementById('brainstormInput');
    const message = customMsg || input.value.trim();
    
    if (!message) return;
    
    if (!skipInput) input.value = '';
    
    // Add user message to UI immediately
    const chatEl = document.getElementById('brainstormChat');
    chatEl.innerHTML += `
        <div style="margin-bottom: 16px; text-align: right;">
            <div style="display: inline-block; max-width: 80%; padding: 12px 16px; border-radius: 16px; 
                        background: var(--accent); color: #fff; text-align: left; white-space: pre-wrap;">
                ${esc(message)}
            </div>
        </div>
    `;
    chatEl.scrollTop = chatEl.scrollHeight;
    
    // Show loading
    chatEl.innerHTML += '<div id="brainstormLoading" style="margin-bottom: 16px;"><div style="display: inline-block; padding: 12px 16px; border-radius: 16px; background: var(--bg-elevated); color: var(--text-secondary);">...</div></div>';
    chatEl.scrollTop = chatEl.scrollHeight;
    
    try {
        const res = await api(`/api/agents/${currentAgent.id}/brainstorm`, {
            method: 'POST',
            body: JSON.stringify({ message })
        });
        
        brainstormSession = { ...brainstormSession, messages: [...(brainstormSession?.messages || []), { role: 'user', content: message }, { role: 'assistant', content: res.response }] };
        
        // Remove loading
        document.getElementById('brainstormLoading')?.remove();
        
        // Add assistant response
        chatEl.innerHTML += `
            <div style="margin-bottom: 16px; text-align: left;">
                <div style="display: inline-block; max-width: 80%; padding: 12px 16px; border-radius: 16px; 
                            background: var(--bg-elevated); color: var(--text-primary); text-align: left; white-space: pre-wrap;">
                    ${esc(res.response)}
                </div>
            </div>
        `;
        chatEl.scrollTop = chatEl.scrollHeight;
        
    } catch(e) {
        document.getElementById('brainstormLoading')?.remove();

async function finalizeBrainstorm() {
    if (!brainstormSession || !brainstormSession.messages || brainstormSession.messages.length < 6) {
        toast('Vui lòng trò chuyện thêm để AI hiểu rõ doanh nghiệp của bạn (ít nhất 3 câu hỏi)', '⚠️');

    const chatEl = document.getElementById('brainstormChat');
    chatEl.innerHTML += '<div style="text-align: center; padding: 20px; color: var(--accent);">🤖 Đang tạo cấu hình...</div>';
    chatEl.scrollTop = chatEl.scrollHeight;
    
    try {
        const res = await api(`/api/agents/${currentAgent.id}/brainstorm/finalize`, {
            method: 'POST'
        });
        
        toast('✨ Đã tạo cấu hình thành công!', '✓');

        toast('Lỗi: ' + e.message, '❌');

async function toggleTool(toolId) {
    const checkbox = document.getElementById(`tool_${toolId}`);
    const toolsEnabled = currentAgent.tools_enabled || [];
    
    let newTools;
    if (checkbox.checked) {
        newTools = [...new Set([...toolsEnabled, toolId])];
    } else {
        newTools = toolsEnabled.filter(t => t !== toolId);
    }
    
    try {
        await api(`/api/agents/${currentAgent.id}`, {
            method: 'PUT',
            body: JSON.stringify({ tools_enabled: newTools })
        });
        currentAgent.tools_enabled = newTools;
        toast('Đã cập nhật!', '✓');
    } catch(e) {
        toast('Lỗi: ' + e.message, '❌');
        checkbox.checked = !checkbox.checked;
    }
}

async function updateBusinessHours() {
    const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
    const hours = {};
    
    days.forEach(day => {
        hours[day] = {
            enabled: document.getElementById(`day_${day}`).checked,
            open: document.getElementById(`open_${day}`).value,
            close: document.getElementById(`close_${day}`).value
        };
    });
    
    try {
        await api(`/api/agents/${currentAgent.id}`, {
            method: 'PUT',
            body: JSON.stringify({ business_hours: hours })
        });
        currentAgent.business_hours = hours;
        toast('Đã cập nhật giờ làm việc!', '✓');
    } catch(e) {
        toast('Lỗi: ' + e.message, '❌');
    }
}

async function saveToolsConfig() {
    const escalationConfig = {
        email: document.getElementById('escalationEmail').value,
        telegram_chat_id: document.getElementById('escalationTelegram').value
    };
    
    try {

        });

        toast('Đã lưu cấu hình!', '✓');
    } catch(e) {
        toast('Lỗi: ' + e.message, '❌');
    }
}

function renderTicketsList(tickets) {

    return tickets.map(t => `
        <div style="padding: 16px; background: var(--bg-elevated); border-radius: 12px; margin-bottom: 12px; border-left: 4px solid ${priorityColors[t.priority]};">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                <div>
                    <h4 style="color: var(--text-primary); margin-bottom: 4px;">${esc(t.subject)}</h4>
                    <div style="font-size: 13px; color: var(--text-secondary);">${esc(t.description || '').substring(0, 150)}${(t.description || '').length > 150 ? '...' : ''}</div>
                </div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span style="padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: ${statusColors[t.status]}; color: #fff;">
                        ${t.status.toUpperCase()}
                    </span>
                    <span style="padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: ${priorityColors[t.priority]}; color: #fff;">
                        ${t.priority.toUpperCase()}
                    </span>

async function renderAnalyticsTab(el) {

        el.innerHTML = `

                    </div>
                    <div class="card" style="padding: 20px; text-align: center;">

                            ${analytics.total_messages || 0}

                        <div style="color: var(--text-secondary); font-size: 13px;">Tổng tin nhắn</div>
                    </div>
                    <div class="card" style="padding: 20px; text-align: center;">
                        <div style="font-size: 32px; font-weight: 700; color: var(--purple); margin-bottom: 8px;">
                            ${analytics.response_time_avg || '< 1s'}
                        </div>
                        <div style="color: var(--text-secondary); font-size: 13px;">Thời gian phản hồi TB</div>
                    </div>
                </div>
                
                <!-- Messages per day chart -->
                <div class="card" style="padding: 24px;">
                    <h4 style="font-size: 16px; font-weight: 600; margin-bottom: 20px;">Tin nhắn 7 ngày gần đây</h4>
                    <div style="display: flex; align-items: flex-end; gap: 12px; height: 200px;">
                        ${days.map(day => {
                            const count = messagesByDay[day];
                            const height = (count / maxMessages) * 100;
                            return `
                                <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                                    <div style="width: 100%; background: var(--accent); border-radius: 6px 6px 0 0; height: ${height}%; min-height: 4px; position: relative; transition: all .2s;" title="${count} tin nhắn">
                                        <div style="position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; color: var(--accent);">${count}</div>
                                    </div>
                                    <div style="font-size: 10px; color: var(--text-secondary);">${day.substring(5)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                
                <!-- Channel breakdown -->
                <div class="card" style="padding: 24px;">
                    <h4 style="font-size: 16px; font-weight: 600; margin-bottom: 20px;">Phân bổ theo kênh</h4>
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        ${Object.entries(channelBreakdown).map(([channel, count]) => {
                            const percentage = totalConvs > 0 ? Math.round((count / totalConvs) * 100) : 0;
                            return `
                                <div>
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px;">
                                        <span>${channelIcon(channel)} ${channel}</span>

                        ${(analytics.top_queries || []).map((query, i) => `
                            <div style="padding: 12px; background: var(--bg-input); border-radius: 8px; font-size: 13px;">
                                <span style="color: var(--text-secondary); margin-right: 8px;">${i + 1}.</span>

    document.getElementById('replyContent').value = '';
    document.getElementById('replyShortcut').value = '';
}

async function saveReply() {
    const title = document.getElementById('replyTitle').value.trim();
    const content = document.getElementById('replyContent').value.trim();
    const shortcut = document.getElementById('replyShortcut').value.trim();
    
    if (!title || !content) {
        toast('Vui lòng nhập tiêu đề và nội dung', '⚠️');
        return;
    }
    
    try {
        await api(`/api/agents/${currentAgent.id}/replies`, {
            method: 'POST',
            body: JSON.stringify({ title, content, shortcut })
        });
        toast('Đã lưu câu trả lời!', '✅');
        hideAddReplyForm();
        renderRepliesTab(document.getElementById('agentTabContent'));
    } catch (e) {
        toast('Lỗi: ' + e.message, '❌');
    }
}

async function deleteReply(replyId) {
    if (!confirm('Xóa câu trả lời này?')) return;
    
    try {
        await api(`/api/agents/${currentAgent.id}/replies/${replyId}`, { method: 'DELETE' });
        toast('Đã xóa!', '✅');
        renderRepliesTab(document.getElementById('agentTabContent'));
    } catch (e) {
        toast('Lỗi: ' + e.message, '❌');
    }
}

function closeCreateAgent() {

async function createAgent() {

        return;
    }
    try {

    try {
        const data = await api('/api/agents');
        agents = data.agents || [];

    const list = document.getElementById('agentList');

                <span class="agent-name">${esc(a.name)}</span>
            </div>
        `).join('');
    }
}

// === NOTIFICATIONS ===
let notifPanelOpen = false;

async function toggleNotifications() {
    notifPanelOpen = !notifPanelOpen;
    const panel = document.getElementById('notifPanel');
    panel.style.display = notifPanelOpen ? 'block' : 'none';
    
    if (notifPanelOpen) {
        await loadNotifications();
    }
}

async function loadNotifications() {
    try {
        const data = await api('/api/notifications?limit=20');
        const list = document.getElementById('notifList');
        
        if (!data || data.length === 0) {
            list.innerHTML = '<div style="padding: 24px; text-align: center; color: var(--text-secondary); font-size: 13px;">Không có thông báo mới</div>';
            return;
        }
        
        list.innerHTML = data.map(n => `
            <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; ${n.is_read ? 'opacity: 0.6;' : ''}" onclick="handleNotificationClick('${n.id}', '${n.link || ''}')">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 4px;">
                    <strong style="font-size: 13px; font-weight: 600;">${esc(n.title)}</strong>
                    <span style="font-size: 11px; color: var(--text-secondary);">${timeAgo(n.created_at)}</span>
                </div>
                <div style="font-size: 12px; color: var(--text-secondary);">${esc(n.message || '')}</div>
            </div>
        `).join('');
        
        // Update count badge
        const unread = data.filter(n => !n.is_read).length;
        const badge = document.getElementById('notifCount');
        if (unread > 0) {
            badge.textContent = unread > 9 ? '9+' : unread;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }
    } catch (e) {
        console.error('Failed to load notifications:', e);
    }
}

async function handleNotificationClick(notifId, link) {
    try {
        await api(`/api/notifications/${notifId}/read`, { method: 'PUT' });
        if (link) {
            // Parse link and navigate
            const url = new URL(link, window.location.origin);
            const params = new URLSearchParams(url.search);
            const tab = params.get('tab');
            const id = params.get('id');
            
            if (tab === 'conversations' && id) {
                showView('conversations');
                // TODO: open specific conversation
            }
        }
        loadNotifications();
    } catch (e) {
        console.error('Failed to mark as read:', e);
    }
}

async function markAllNotificationsRead() {
    try {
        const data = await api('/api/notifications?limit=50');
        for (const n of data) {
            if (!n.is_read) {
                await api(`/api/notifications/${n.id}/read`, { method: 'PUT' });
            }
        }
        loadNotifications();
    } catch (e) {
        console.error('Failed to mark all as read:', e);
    }
}

// Poll notifications every 30 seconds
setInterval(() => {
    if (!notifPanelOpen) {
        api('/api/notifications/unread').then(data => {
            const badge = document.getElementById('notifCount');
            if (data && data.count > 0) {
                badge.textContent = data.count > 9 ? '9+' : data.count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }).catch(() => {});
    }
}, 30000);

                <div style="margin-top: 12px; font-size: 11px; color: var(--text-secondary);">
                    Lần đầu: ${timeAgo(cust.first_seen)}
                </div>
            </div>
        `).join('') : '<div style="grid-column: 1/-1; text-align: center; padding: 48px; color: var(--text-secondary);">Chưa có khách hàng nào</div>';
        
        // Search functionality
        document.getElementById('customerSearch').addEventListener('input', async (e) => {
            const search = e.target.value;
            const filtered = await api(`/api/agents/${currentAgent.id}/customers?search=${encodeURIComponent(search)}`);
            document.getElementById('customerList').innerHTML = filtered.map(cust => `<!-- same as above -->`).join('');
        });
        
    } catch (e) {
        document.getElementById('customerList').innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 48px; color: var(--red);">Lỗi: ${e.message}</div>`;
    }
}

async function viewCustomerDetail(senderId) {
    if (!currentAgent) return;
    
    const c = document.getElementById('content');
    c.innerHTML = '<div class="loading" style="padding: 48px; text-align: center;">Đang tải...</div>';
    
    try {
        const customer = await api(`/api/agents/${currentAgent.id}/customers/${senderId}`);
        
        c.innerHTML = `
            <div style="margin-bottom: 24px;">
                <button onclick="renderCustomers()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                    ← Quay lại danh sách
                </button>
            </div>
            
            <div style="display: grid; grid-template-columns: 320px 1fr; gap: 24px;">
                <!-- Customer Info Sidebar -->
                <div class="card" style="padding: 24px; height: fit-content;">
                    <div style="text-align: center; margin-bottom: 24px;">
                        <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; font-weight: 600; margin: 0 auto 12px;">
                            ${(customer.name || 'U')[0].toUpperCase()}
                        </div>
                        <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 4px;">${esc(customer.name)}</h3>
                        <div style="font-size: 13px; color: var(--text-secondary);">ID: ${customer.sender_id.substring(0, 12)}...</div>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 16px;">
                        <div>
                            <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">Kênh</div>
                            <div style="display: flex; gap: 8px;">
                                ${(customer.metadata?.channels || ['webchat']).map(ch => `<span style="padding: 4px 12px; background: var(--bg-input); border-radius: 16px; font-size: 12px;">${channelIcon(ch)} ${ch}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div>
                            <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">Email</div>
                            <div style="font-size: 13px;">${esc(customer.metadata?.email || 'Chưa có')}</div>
                        </div>
                        
                        <div>
                            <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">Số điện thoại</div>
                            <div style="font-size: 13px;">${esc(customer.metadata?.phone || 'Chưa có')}</div>
                        </div>
                        
                        <div>
                            <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">Tổng hội thoại</div>
                            <div style="font-size: 20px; font-weight: 600;">${customer.conversations?.length || 0}</div>
                        </div>
                        
                        <button class="btn btn-sm btn-ghost" onclick="editCustomerInfo('${customer.sender_id}')">
                            ✏️ Chỉnh sửa thông tin
                        </button>
                    </div>
                </div>
                
                <!-- Conversations List -->
                <div class="card" style="padding: 24px;">
                    <h4 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;">Lịch sử hội thoại</h4>
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        ${(customer.conversations || []).map(conv => `
                            <div class="card" style="padding: 16px; cursor: pointer; background: var(--bg-input);" onclick="viewConversation('${conv.id}')">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <span style="font-size: 18px;">${channelIcon(conv.channel)}</span>
                                        <span style="font-weight: 500; font-size: 14px;">${conv.channel}</span>
                                    </div>
                                    <span style="font-size: 12px; color: var(--text-secondary);">${timeAgo(conv.created_at)}</span>
                                </div>
                                <div style="font-size: 13px; color: var(--text-secondary);">
                                    ${conv.message_count || 0} tin nhắn
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    } catch (e) {
        c.innerHTML = `<div style="text-align: center; padding: 48px; color: var(--red);">Lỗi: ${e.message}</div>`;
    }
}

// HELPERS
function esc(s) {
    if(!s) return '';
    const d=document.createElement('div');
    d.textContent=s;
    return d.innerHTML;
}
function channelIcon(ch) {
    return {telegram:'🤖',facebook:'📘',zalo:'💙',webchat:'🌐'}[ch]||'💬';
}
function timeAgo(ts) {
    if(!ts) return '';
    const d = (Date.now() - new Date(ts).getTime())/1000;
    if(d<60) return 'vừa xong';
    if(d<3600) return Math.floor(d/60)+'p';
    if(d<86400) return Math.floor(d/3600)+'h';
    return Math.floor(d/86400)+'d';
}
